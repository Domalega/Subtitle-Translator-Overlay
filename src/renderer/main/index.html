<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subtitle Translation Overlay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="mainHeader" style="-webkit-app-region: drag;">
          <div class="appTitle">Subtitle Translator Overlay</div>
          <div class="headerButtons" style="-webkit-app-region: no-drag;">
            <button id="playPause" class="primary">Start</button>
            <button id="ocrOnce">Read once</button>
            <button id="addWord">Add word</button>
            <button id="dictionaryOpen">Dictionary</button>
            <button id="settingsToggle">Settings</button>
            <button id="focusToggle">Focus mode</button>
            <button id="gameModeToggle">Game mode</button>
          </div>
        </div>

        <div class="status" id="status"></div>
        <section id="developerTools" class="developerTools" hidden>
          <div class="developerToolsHeader">Developer tools</div>
          <div id="developerStatus" class="developerStatus">Developer status unavailable</div>
          <div class="developerButtons">
            <button id="saveOcrSample">Save OCR sample</button>
            <button id="saveDetectionSample">Save detection sample</button>
            <button id="openOcrDiagnostics">Open diagnostics folder</button>
            <button id="findSubtitleArea">Find subtitles now</button>
            <button id="useDetectedSubtitleArea">Use detected area</button>
            <button id="stopAutoTracking">Stop auto tracking</button>
          </div>
        </section>
        <button id="retranslateButton" hidden>Retranslate edited</button>

        <div class="subtitleBox">
          <div class="subtitleColumn original">
            <div class="label">English</div>
            <div id="englishText" class="subtitleText">No subtitle loaded</div>
          </div>
          <div class="subtitleColumn translated">
            <div class="label">Russian</div>
            <div id="russianText" class="subtitleText">Translation will appear here</div>
          </div>
        </div>
      </section>
    </main>
    <script src="../../shared/ocr/text-utils.js"></script>
    <script src="../../shared/ocr/subtitle-stabilizer.js"></script>
    <script src="../../shared/output/main-panel-output.js"></script>
    <script src="../../shared/output/near-source-output.js"></script>
    <script src="../../shared/output/output-router.js"></script>
    <script src="../../shared/ocr/latest-frame-queue.js"></script>
    <script src="../../shared/ocr/screen-ocr-coordinator.js"></script>
    <script src="renderer.js"></script>
    <script src="subtitle-area-detection-controller.js"></script>
  </body>
</html>
