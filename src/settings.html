<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="stylesheet" href="tool-window.css" />
  </head>
  <body>
    <main class="toolWindow">
      <header class="toolTitlebar">
        <div>
          <strong>Settings</strong>
          <span>Overlay appearance and OCR area</span>
        </div>
        <button id="closeWindow" class="windowButton">Close</button>
      </header>

      <section class="card">
        <button id="selectOcrArea" class="primary">Select OCR area</button>
        <p class="hint">Choose only the original subtitle area at the bottom of the video.</p>
      </section>

      <section class="card">
        <div class="accordionHeader" data-section="appearance">
          <strong>Appearance</strong>
          <span class="accordionChevron">▾</span>
        </div>
        <div class="accordionBody formGrid" id="sectionAppearance">
          <label>
            Theme
            <select id="themeSelect">
              <option value="green">Green</option>
              <option value="blue">Blue</option>
              <option value="purple">Purple</option>
              <option value="dark">Dark</option>
              <option value="nothing">Nothing Light</option>
              <option value="nothing-dark">Nothing Dark</option>
              <option value="nothing-os-light">Nothing OS Light</option>
              <option value="nothing-os-dark">Nothing OS Dark</option>
            </select>
          </label>
          <label>
            Font
            <select id="fontSelect">
              <option value="system">System</option>
              <option value="inter">Inter</option>
              <option value="segoe ui">Segoe UI</option>
              <option value="arial">Arial</option>
              <option value="consolas">Consolas</option>
              <option value="jetbrains mono">JetBrains Mono</option>
              <option value="dot matrix">Dot Matrix</option>
            </select>
          </label>
        </div>
      </section>

      <section class="card">
        <div class="accordionHeader" data-section="size">
          <strong>Overlay size</strong>
          <span class="accordionChevron">▸</span>
        </div>
        <div class="accordionBody formGrid" id="sectionSize">
          <label>
            Text size
            <div class="sliderRow">
              <input id="fontScale" type="range" min="70" max="150" value="100" />
              <span class="sliderValue" id="fontScaleValue">100%</span>
            </div>
          </label>
          <label>
            Window width
            <div class="sliderRow">
              <input id="windowWidth" type="range" min="620" max="1500" value="980" />
              <span class="sliderValue" id="windowWidthValue">980 px</span>
            </div>
          </label>
          <label>
            Window height
            <div class="sliderRow">
              <input id="windowHeight" type="range" min="260" max="760" value="360" />
              <span class="sliderValue" id="windowHeightValue">360 px</span>
            </div>
          </label>
        </div>
      </section>

      <section class="card">
        <div class="accordionHeader" data-section="gameOcr">
          <strong>Game OCR</strong>
          <span class="accordionChevron">▸</span>
        </div>
        <div class="accordionBody formGrid" id="sectionGameOcr">
          <label>
            Capture hotkey
            <input type="text" id="gameHotkey" placeholder="CommandOrControl+Shift+T" />
          </label>
        </div>
      </section>

      <section class="card">
        <div class="accordionHeader" data-section="dictionary">
          <strong>Dictionary</strong>
          <span class="accordionChevron">▸</span>
        </div>
        <div class="accordionBody formGrid" id="sectionDictionary">
          <label style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" id="deleteConfirmToggle" checked />
            Confirm before deleting words
          </label>
        </div>
      </section>

      <section class="card">
        <div class="accordionHeader" data-section="context">
          <strong>Context</strong>
          <span class="accordionChevron">▸</span>
        </div>
        <div class="accordionBody formGrid" id="sectionContext">
          <label>
            Context examples count
            <select id="contextCountSelect">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
            </select>
          </label>
        </div>
      </section>

      <section class="card">
        <button id="resetDefaults">Reset to defaults</button>
      </section>

      <div id="status" class="status" hidden></div>
    </main>
    <script src="settings.js"></script>
  </body>
</html>
