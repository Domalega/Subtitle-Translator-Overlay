<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subtitle Translation Overlay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="dragStrip">Drag here to move</div>
        <div class="toolbar">
          <button id="playPause" class="primary">Start</button>
          <button id="ocrOnce">Read once</button>
          <button id="settingsToggle">Settings</button>
          <button id="hideControls">Compact view</button>
        </div>

        <div id="settingsPanel" class="settingsPanel" hidden>
          <button id="selectOcrArea">Select OCR area</button>
          <label class="settingControl">
            Text
            <input id="fontScale" type="range" min="70" max="150" value="100" />
          </label>
          <label class="settingControl">
            Width
            <input id="windowWidth" type="range" min="520" max="1500" value="980" />
          </label>
          <label class="settingControl">
            Height
            <input id="windowHeight" type="range" min="220" max="760" value="360" />
          </label>
          <label class="settingControl">
            Theme
            <select id="themeSelect">
              <option value="green">Green</option>
              <option value="blue">Blue</option>
              <option value="purple">Purple</option>
              <option value="dark">Dark</option>
            </select>
          </label>
        </div>

        <div class="status" id="status"></div>

        <div class="subtitleBox">
          <div class="subtitleColumn original">
            <div class="label">English</div>
            <div id="englishText" class="subtitleText">No subtitle loaded</div>
          </div>
          <div class="subtitleColumn translated">
            <div class="label">Russian</div>
            <div id="russianText" class="subtitleText">Translation will appear here</div>
          </div>
        </div>
      </section>
    </main>
    <script src="renderer.js"></script>
  </body>
</html>
