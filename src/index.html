<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Subtitle Translation Overlay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="dragStrip">Drag here to move</div>
        <div class="toolbar">
          <button id="playPause" class="primary">Start</button>
          <button id="ocrOnce">Read once</button>
          <button id="addWord">Add word</button>
          <button id="dictionaryOpen">Dictionary</button>
          <button id="settingsToggle">Settings</button>
          <button id="hideControls">Compact view</button>
        </div>

        <div class="status" id="status"></div>

        <div class="subtitleBox">
          <div class="subtitleColumn original">
            <div class="label">English</div>
            <div id="englishText" class="subtitleText">No subtitle loaded</div>
          </div>
          <div class="subtitleColumn translated">
            <div class="label">Russian</div>
            <div id="russianText" class="subtitleText">Translation will appear here</div>
          </div>
        </div>
      </section>
    </main>
    <script src="renderer.js"></script>
  </body>
</html>
