<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="stylesheet" href="tool-window.css" />
  </head>
  <body>
    <main class="toolWindow">
      <header class="toolTitlebar">
        <div>
          <strong>Settings</strong>
          <span>Overlay appearance and OCR area</span>
        </div>
        <button id="closeWindow" class="windowButton">Close</button>
      </header>

      <section class="card">
        <button id="selectOcrArea" class="primary">Select OCR area</button>
        <p class="hint">Choose only the original subtitle area at the bottom of the video.</p>
      </section>

      <section class="card formGrid">
        <label>
          Theme
          <select id="themeSelect">
            <option value="green">Green</option>
            <option value="blue">Blue</option>
            <option value="purple">Purple</option>
            <option value="dark">Dark</option>
            <option value="nothing">Nothing Light</option>
            <option value="nothing-dark">Nothing Dark</option>
            <option value="nothing-os-light">Nothing OS Light</option>
            <option value="nothing-os-dark">Nothing OS Dark</option>
          </select>
        </label>

        <label>
          Text size
          <div class="sliderRow">
            <input id="fontScale" type="range" min="70" max="150" value="100" />
            <span class="sliderValue" id="fontScaleValue">100%</span>
          </div>
        </label>

        <label>
          Window width
          <div class="sliderRow">
            <input id="windowWidth" type="range" min="620" max="1500" value="980" />
            <span class="sliderValue" id="windowWidthValue">980 px</span>
          </div>
        </label>

        <label>
          Window height
          <div class="sliderRow">
            <input id="windowHeight" type="range" min="260" max="760" value="360" />
            <span class="sliderValue" id="windowHeightValue">360 px</span>
          </div>
        </label>
      </section>

      <section class="card">
        <strong style="display:block;margin-bottom:10px">Game OCR</strong>
        <div class="formGrid">
          <label>
            Mode
            <select id="gameOcrMode">
              <option value="hotkey">Hotkey only</option>
              <option value="live">Live scan</option>
            </select>
          </label>

          <label>
            Live scan interval
            <select id="gameOcrInterval">
              <option value="2">2 sec</option>
              <option value="3">3 sec</option>
              <option value="5">5 sec</option>
              <option value="10">10 sec</option>
            </select>
          </label>

          <label>
            Overlay width
            <div class="sliderRow">
              <input id="gameCardWidth" type="range" min="300" max="800" value="480" />
              <span class="sliderValue" id="gameCardWidthValue">480 px</span>
            </div>
          </label>

          <label>
            Overlay font size
            <div class="sliderRow">
              <input id="gameCardFontSize" type="range" min="11" max="20" value="14" />
              <span class="sliderValue" id="gameCardFontSizeValue">14 px</span>
            </div>
          </label>

          <label>
            Overlay opacity
            <div class="sliderRow">
              <input id="gameCardOpacity" type="range" min="50" max="100" value="100" />
              <span class="sliderValue" id="gameCardOpacityValue">100%</span>
            </div>
          </label>
        </div>
      </section>

      <section class="card">
        <button id="resetDefaults">Reset to defaults</button>
      </section>

      <div id="status" class="status" hidden></div>
    </main>
    <script src="settings.js"></script>
  </body>
</html>
