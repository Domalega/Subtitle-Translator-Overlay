<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="stylesheet" href="tool-window.css" />
  </head>
  <body>
    <main class="toolWindow">
      <header class="toolTitlebar">
        <div>
          <strong>Settings</strong>
          <span>Overlay appearance and OCR area</span>
        </div>
        <button id="closeWindow" class="windowButton">Close</button>
      </header>

      <section class="card">
        <button id="selectOcrArea" class="primary">Select OCR area</button>
        <p class="hint">Choose only the original subtitle area at the bottom of the video.</p>
      </section>

      <section class="card formGrid">
        <label>
          Theme
          <select id="themeSelect">
            <option value="green">Green</option>
            <option value="blue">Blue</option>
            <option value="purple">Purple</option>
            <option value="dark">Dark</option>
            <option value="nothing">Nothing Light</option>
            <option value="nothing-dark">Nothing Dark</option>
            <option value="nothing-os-light">Nothing OS Light</option>
            <option value="nothing-os-dark">Nothing OS Dark</option>
          </select>
        </label>

        <label>
          Text size
          <div class="sliderRow">
            <input id="fontScale" type="range" min="70" max="150" value="100" />
            <span class="sliderValue" id="fontScaleValue">100%</span>
          </div>
        </label>

        <label>
          Window width
          <div class="sliderRow">
            <input id="windowWidth" type="range" min="620" max="1500" value="980" />
            <span class="sliderValue" id="windowWidthValue">980 px</span>
          </div>
        </label>

        <label>
          Window height
          <div class="sliderRow">
            <input id="windowHeight" type="range" min="260" max="760" value="360" />
            <span class="sliderValue" id="windowHeightValue">360 px</span>
          </div>
        </label>
      </section>

      <section class="card">
        <button id="resetDefaults">Reset to defaults</button>
      </section>

      <div id="status" class="status" hidden></div>
    </main>
    <script src="settings.js"></script>
  </body>
</html>
