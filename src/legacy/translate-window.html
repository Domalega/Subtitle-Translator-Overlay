<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Translation</title>
    <link rel="stylesheet" href="tool-window.css" />
  </head>
  <body>
    <main class="toolWindow">
      <header class="toolTitlebar">
        <div>
          <strong>Screen Translation</strong>
          <span id="translateStatus">Select area with Ctrl+Shift+T</span>
        </div>
        <button id="closeWindow" class="windowButton">Close</button>
      </header>

      <section class="card">
        <strong>Original</strong>
        <div class="translateTextBlock" id="originalText">No capture yet</div>
        <div class="copyButtons">
          <button id="copyOriginal">Copy original</button>
        </div>
      </section>

      <section class="card">
        <strong>Translation</strong>
        <div class="translateTextBlock" id="translatedText">-</div>
        <div class="copyButtons">
          <button id="copyTranslation">Copy translation</button>
        </div>
      </section>

      <section class="card" id="wordsCard" style="display:none">
        <strong>Recognized words</strong>
        <div class="wordChips" id="wordChips"></div>
      </section>

      <div id="status" class="status" hidden></div>
    </main>
    <script src="translate-window.js"></script>
  </body>
</html>
